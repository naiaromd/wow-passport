}

function curEvD(){return mode==='voice'?DATA[curVoice().dataIdx]:DATA[sel];}
function rerenderEv(){renderList();if(mode==='voice'){if(vsel!=null)renderVQCenter();renderVRight();}else{if(sel!=null)renderCenter();renderRight();}renderSummary();}
function reqOrg(kind){const d=curEvD();if(d.final_wow_level!=='Level 4'){toast('ต้องผ่าน Level 4 ก่อน');return;}d.organization_review_status=kind==='src'?'Source Review Requested':'Requested';toast('ขอการรับรอง'+(kind==='src'?'จากผู้ออกเอกสาร':'จากองค์กร'));rerenderEv();}
function confirmL5(){const d=curEvD();if(d.organization_review_status==='Not Requested'){toast('ต้องขอการรับรองก่อน');return;}d.organization_review_status='Verified';d.final_trust_level='Level 5';toast('Organization / Source Verified · Level 5');rerenderEv();}
function l5Block(d){if(d.final_wow_level!=='Level 4')return '<div class="l5box dim"><div class="l5h">⬆ Level 5 · Organization / Source Verification</div><div class="l5sub">เปิดได้หลังผ่าน Level 4 เท่านั้น</div></div>';
 const reqd=d.organization_review_status!=='Not Requested';let inner;
 if(!reqd){inner='<div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap"><button class="sdbtn" onclick="reqOrg(\'org\')">Request Organization Verification</button><button class="sdbtn" onclick="reqOrg(\'src\')">Request Source Verification</button></div>';}
 else{inner='<div class="rbox" style="margin-top:8px"><small>สถานะ</small><div class="v">'+d.organization_review_status+'</div></div>'+(d.organization_review_status!=='Verified'?'<button class="apply" style="background:var(--champ2)" onclick="confirmL5()">✓ Organization / Source Verified → Level 5</button>':'<div class="ibadge ia">✓ Level 5 Verified</div>');}
 return '<div class="l5box"><div class="l5h">⬆ Level 5 · Organization / Source Verification</div>'+inner+'</div>';}
function toast(t){const e=document.getElementById('toast');e.textContent=t;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2000);}
function setState(d,dec,name,note){d.wow_reviewer_name=name;d.wow_reviewer_note=note;d.wow_reviewer_decision=dec;d.reviewed_date=TODAY;d.organization_review_status='Not Requested';
 if(dec==='l4'||dec==='vc'){d.wow_review_status='Reviewed';d.final_wow_level='Level 4';d.final_trust_level='Level 4';}
 else if(dec==='note'||dec==='vn'){d.wow_review_status='Reviewed (with note)';d.final_wow_level='Level 4';d.final_trust_level='Level 4';}
 else if(dec==='name'){d.wow_review_status='Name Confirmation Requested';d.final_wow_level='Pending';d.final_trust_level='Level 3';}
 else if(dec==='more'){d.wow_review_status='More Evidence Requested';d.final_wow_level='Pending';d.final_trust_level='Level 3';}
 else if(dec==='vr'){d.wow_review_status='Re-submission Requested';d.final_wow_level='Pending';d.final_trust_level='Level 3';}
 else if(dec==='notrel'||dec==='vx'){d.wow_review_status='Reviewed — Not Relevant';d.final_wow_level='Not Used';d.final_trust_level='Not Used';}
 else if(dec==='org'||dec==='vo'){d.wow_review_status='Escalated to Organization';d.organization_review_status='Requested';d.final_wow_level='Level 4';d.final_trust_level='Level 4';}
 else if(dec==='source'){d.wow_review_status='Escalated to Source';d.organization_review_status='Source Review Requested';d.final_wow_level='Level 4';d.final_trust_level='Level 4';}}
function apply(){const d=DATA[sel];const dec=document.getElementById('dec').value,name=document.getElementById('rname').value.trim(),note=document.getElementById('rnote').value.trim();
 if(!dec){toast('เลือก Reviewer Decision');return;} if(dec==='note'&&!note){toast('Approve with Note ต้องใส่ note');return;}
 setState(d,dec,name,note);renderList();renderCenter();renderRight();renderSummary();toast('บันทึกแล้ว · '+d.evidence_id);}
function applyV(){const v=curVoice(),d=DATA[v.dataIdx];const dec=document.getElementById('dec').value,name=document.getElementById('rname').value,note=document.getElementById('rnote').value.trim();
 if(!dec){toast('เลือก Reviewer Decision');return;} if(dec==='vn'&&!note){toast('Confirm with Note ต้องใส่ note');return;}
 setState(d,dec,name,note);renderList();if(vsel!=null)renderVQCenter();renderVRight();renderSummary();toast('บันทึกผลเสียงแล้ว · '+v.pid);}
function csvCell(v){v=(v===undefined||v===null)?'':String(v);v=v.split('"').join('""');return /[",\n]/.test(v)?'"'+v+'"':v;}
function exportCSV(){const lbl=d=>DECLBL[d]||VDEC[d]||'';const lines=[EXPORT_COLS.join(',')];DATA.forEach(d=>{lines.push(EXPORT_COLS.map(c=>c==='wow_reviewer_decision'?csvCell(lbl(d[c])):csvCell(d[c])).join(','));});
 const blob=new Blob(['﻿'+lines.join('\n')],{type:'text/csv;charset=utf-8;'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='WOW_Evidence_Review_Export.csv';a.click();toast('Export CSV · '+DATA.length+' rows');}
renderParts();renderFilters();renderList();renderSummary();
